# Project-scoped Codex defaults.
# Codex loads this only after the repository is trusted.

model = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "none"
model_verbosity = "low"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[agents]
# Root session + at most two specialists in normal operation.
max_threads = 3
# Prevent recursive fan-out. Specialists report routing needs to the root manager.
max_depth = 1
# Cap batch-worker time. Normal specialists should finish earlier.
job_max_runtime_seconds = 900
